name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Pin npm 11.7.0
        run: npm install --global npm@11.7.0

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Create release archive
        run: |
          tar -czf release.tar.gz \
            dist \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            scripts/deploy

      - name: Prepare remote temporary directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: mkdir -p "${{ secrets.DEPLOY_TMP_PATH }}"

      - name: Upload release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: release.tar.gz,scripts/deploy/remote-deploy.sh
          target: ${{ secrets.DEPLOY_TMP_PATH }}

      - name: Run remote deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          envs: DEPLOY_APP_PATH,DEPLOY_TMP_PATH,HEALTHCHECK_URL
          script: |
            bash "${DEPLOY_TMP_PATH}/scripts/deploy/remote-deploy.sh" \
              "${DEPLOY_APP_PATH}" \
              "${DEPLOY_TMP_PATH}/release.tar.gz" \
              "${HEALTHCHECK_URL}"
        env:
          DEPLOY_APP_PATH: ${{ secrets.DEPLOY_APP_PATH }}
          DEPLOY_TMP_PATH: ${{ secrets.DEPLOY_TMP_PATH }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
