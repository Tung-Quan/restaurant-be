name: Run Production Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-run
  cancel-in-progress: true

jobs:
  run-app:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup latest Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          check-latest: true
          cache: npm

      - name: Install latest npm
        run: npm install --global npm@latest

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Validate runtime secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          missing=0

          if [ -z "${DATABASE_URL}" ]; then
            for secret_name in DB_HOST DB_PORT DB_USERNAME DB_PASSWORD DB_NAME; do
              if [ -z "${!secret_name}" ]; then
                echo "::error title=Missing runtime secret::${secret_name} is required when DATABASE_URL is not set."
                missing=1
              fi
            done
          fi

          if [ -z "${JWT_SECRET}" ]; then
            echo "::error title=Missing runtime secret::JWT_SECRET is not set in the production environment secrets."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Start backend
        env:
          NODE_ENV: production
          PORT: ${{ vars.PORT || 3000 }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: ${{ vars.DB_SSL || 'true' }}
          DB_SYNCHRONIZE: ${{ vars.DB_SYNCHRONIZE || 'false' }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ vars.JWT_EXPIRATION || '1h' }}
          TAX_RATE: ${{ vars.TAX_RATE || '10' }}
        run: |
          node dist/main.js > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for healthcheck
        env:
          PORT: ${{ vars.PORT || 3000 }}
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error "http://127.0.0.1:${PORT}/api/v1" > /dev/null; then
              echo "Healthcheck passed on attempt ${attempt}"
              exit 0
            fi

            if [ -f app.log ]; then
              tail -n 20 app.log
            fi

            sleep 5
          done

          echo "::error title=Startup failed::Backend did not become healthy on http://127.0.0.1:${PORT}/api/v1"
          if [ -f app.log ]; then
            cat app.log
          fi
          exit 1

      - name: Stop backend
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
